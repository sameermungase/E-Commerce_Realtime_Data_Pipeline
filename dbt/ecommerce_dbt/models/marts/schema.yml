version: 2

models:
  - name: fact_orders
    description: >
      Fact table: each row is an order line item with pricing,
      customer, and product references. Built by joining staged
      orders with staged order items.
    columns:
      - name: order_id
        description: "Order identifier"
        tests:
          - not_null
      - name: customer_id
        description: "FK to dim_customers"
        tests:
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: customer_id
      - name: product_id
        description: "FK to dim_products"
        tests:
          - not_null
          - relationships:
              to: ref('dim_products')
              field: product_id
      - name: price
        description: "Item price in BRL"
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: true
      - name: freight_value
        description: "Shipping cost in BRL"
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: true
      - name: purchase_timestamp
        description: "When the order was placed"
        tests:
          - not_null

  - name: dim_customers
    description: "Dimension table: unique customers with location"
    columns:
      - name: customer_id
        description: "Primary key"
        tests:
          - not_null
          - unique
      - name: customer_city
        description: "Customer city"
        tests:
          - not_null
      - name: customer_state
        description: "Customer state (2-letter code)"
        tests:
          - not_null

  - name: dim_products
    description: "Dimension table: unique products with category"
    columns:
      - name: product_id
        description: "Primary key"
        tests:
          - not_null
          - unique
      - name: product_category
        description: "Product category name"

  - name: fact_orders_realtime
    description: >
      Real-time fact table: order events consumed from Kafka via
      Spark Structured Streaming. Each row is a single order event
      with computed total_value and derived time columns.
    columns:
      - name: order_id
        description: "Unique order identifier from streaming events"
        tests:
          - not_null
          - unique
      - name: customer_id
        description: "Customer who placed the order"
        tests:
          - not_null
      - name: product_id
        description: "Product ordered"
        tests:
          - not_null
      - name: amount
        description: "Unit price of the product"
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: false
      - name: quantity
        description: "Number of units ordered"
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 1
              inclusive: true
      - name: total_value
        description: "Computed: amount × quantity"
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: false
      - name: event_time
        description: "When the order event was generated (UTC)"
        tests:
          - not_null
      - name: processing_time
        description: "When Spark processed the event (UTC)"
        tests:
          - not_null
      - name: order_date
        description: "Derived: date truncation of event_time"
      - name: order_hour
        description: "Derived: hour truncation of event_time"
