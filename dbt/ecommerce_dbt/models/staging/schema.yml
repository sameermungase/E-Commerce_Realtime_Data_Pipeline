version: 2

sources:
  - name: raw
    schema: raw
    description: "Raw tables loaded by PySpark ETL from Olist CSV files"
    tables:
      - name: orders
        description: "Raw order records with timestamps and status"
        columns:
          - name: order_id
            tests:
              - not_null
              - unique
          - name: customer_id
            tests:
              - not_null

      - name: customers
        description: "Raw customer records with location data"
        columns:
          - name: customer_id
            tests:
              - not_null
              - unique

      - name: products
        description: "Raw product records with categories"
        columns:
          - name: product_id
            tests:
              - not_null
              - unique

      - name: order_items
        description: "Raw order line items with pricing"
        columns:
          - name: order_id
            tests:
              - not_null
          - name: order_item_id
            tests:
              - not_null

  - name: streaming
    schema: streaming
    description: "Streaming tables loaded by Spark Structured Streaming from Kafka"
    tables:
      - name: raw_orders_stream
        description: "Real-time order events consumed from Kafka and written via foreachBatch"
        columns:
          - name: order_id
            tests:
              - not_null
              - unique
          - name: customer_id
            tests:
              - not_null
          - name: product_id
            tests:
              - not_null
          - name: amount
            tests:
              - not_null
          - name: total_value
            tests:
              - not_null
          - name: event_time
            tests:
              - not_null

models:
  - name: stg_orders
    description: "Staged orders with cleaned timestamps"
    columns:
      - name: order_id
        description: "Primary key — unique order identifier"
        tests:
          - not_null
          - unique
      - name: customer_id
        description: "FK to stg_customers"
        tests:
          - not_null
      - name: order_status
        description: "Current status of the order"
        tests:
          - not_null
          - accepted_values:
              values:
                - delivered
                - shipped
                - canceled
                - unavailable
                - invoiced
                - processing
                - created
                - approved
      - name: purchase_timestamp
        description: "When the order was placed"
        tests:
          - not_null

  - name: stg_customers
    description: "Staged customers with trimmed location fields"
    columns:
      - name: customer_id
        description: "Primary key — unique customer identifier"
        tests:
          - not_null
          - unique
      - name: customer_city
        description: "Customer city (trimmed)"
        tests:
          - not_null
      - name: customer_state
        description: "Customer state (2-letter code)"
        tests:
          - not_null

  - name: stg_products
    description: "Staged products with cleaned category names"
    columns:
      - name: product_id
        description: "Primary key — unique product identifier"
        tests:
          - not_null
          - unique
      - name: product_category
        description: "Product category name"

  - name: stg_order_items
    description: "Staged order line items with pricing"
    columns:
      - name: order_id
        description: "FK to stg_orders"
        tests:
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id
      - name: order_item_id
        description: "Line item sequence number within an order"
        tests:
          - not_null
      - name: product_id
        description: "FK to stg_products"
        tests:
          - not_null
          - relationships:
              to: ref('stg_products')
              field: product_id
      - name: price
        description: "Item price in BRL"
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: true
      - name: freight_value
        description: "Shipping cost in BRL"
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: true
