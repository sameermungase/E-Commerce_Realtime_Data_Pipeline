version: 2

sources:
  - name: raw
    schema: raw
    description: "Raw tables loaded by PySpark ETL from Olist CSV files"
    tables:
      - name: orders
        description: "Raw order records with timestamps and status"
        columns:
          - name: order_id
            tests:
              - not_null
              - unique
          - name: customer_id
            tests:
              - not_null

      - name: customers
        description: "Raw customer records with location data"
        columns:
          - name: customer_id
            tests:
              - not_null
              - unique

      - name: products
        description: "Raw product records with categories"
        columns:
          - name: product_id
            tests:
              - not_null
              - unique

      - name: order_items
        description: "Raw order line items with pricing"
        columns:
          - name: order_id
            tests:
              - not_null
          - name: order_item_id
            tests:
              - not_null

  - name: streaming
    schema: streaming
    description: "Streaming tables loaded by Spark Structured Streaming from Kafka"
    tables:
      - name: raw_orders_stream
        description: "Real-time order events consumed from Kafka and written via foreachBatch"
        columns:
          - name: order_id
            tests:
              - not_null
              - unique
          - name: customer_id
            tests:
              - not_null
          - name: product_id
            tests:
              - not_null
          - name: amount
            tests:
              - not_null
          - name: total_value
            tests:
              - not_null
          - name: event_time
            tests:
              - not_null

models:
  - name: stg_orders
    description: "Staged orders with cleaned timestamps"
    columns:
      - name: order_id
        tests:
          - not_null
          - unique
      - name: customer_id
        tests:
          - not_null

  - name: stg_customers
    description: "Staged customers with trimmed location fields"
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique

  - name: stg_products
    description: "Staged products with cleaned category names"
    columns:
      - name: product_id
        tests:
          - not_null
          - unique

  - name: stg_order_items
    description: "Staged order line items"
    columns:
      - name: order_id
        tests:
          - not_null
