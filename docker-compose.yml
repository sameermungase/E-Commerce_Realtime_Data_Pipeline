services:

  # ── PostgreSQL Data Warehouse ──────────────────────────────
  postgres:
    image: postgres:16
    container_name: ecommerce_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: ecommerce
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ecommerce"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Zookeeper (Kafka coordination) ─────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: ecommerce_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_4LW_COMMANDS_WHITELIST: "ruok,stat"
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "cub zk-ready localhost:2181 5"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ── Kafka Broker ───────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: ecommerce_kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    ports:
      - "29092:29092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ── One-shot: Create Kafka topic ───────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: ecommerce_kafka_init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      echo 'Creating Kafka topic: orders_stream...' && \
      kafka-topics --create --if-not-exists \
        --bootstrap-server kafka:9092 \
        --replication-factor 1 \
        --partitions 3 \
        --topic orders_stream && \
      echo 'Topic orders_stream created successfully' && \
      kafka-topics --describe --bootstrap-server kafka:9092 --topic orders_stream
    restart: "no"

volumes:
  pgdata:
